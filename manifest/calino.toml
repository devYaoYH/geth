# Calino — a CalDAV web client for viewing and interacting with calendar entries.
# Upstream: github.com/Ivan-Malinovski/calino (MIT), mirrored at mirrors/calino.
# Pinned to commit 8e21e96ec842 (v0.22.7). Image built by scripts/build-mirrored.sh
# from the upstream Dockerfile at deploy time.

[app]
name = "calino"
version = "0.22.7-geth-sso.1"
description = "CalDAV web client; Pocket ID at the door and server-side Radicale auth; upstream: Ivan-Malinovski/calino (MIT)"
image = "sovereign-node/calino:0.22.7-geth-sso.1"
ring = 1

[service]
port = 8080
health = "/"

[needs]
# The browser connects to Radicale through Calino's same-origin DAV proxy
# (/dav/* -> radicale:5232, zero CORS). Caddy validates the operator's Pocket
# ID session and injects the Radicale credential server-side; no calendar
# credential enters the browser.

[resources]
volumes = []
database = "none"

[tests]
command = "curl -fsS $APP_URL/"
timeout_seconds = 15

[lifecycle]
backup = []
update_policy = "pinned"    # pinned to upstream commit 8e21e96ec842; update by
                            # changing the ref in [build] section

[build]
# Mirror repo (mirrors/calino), pinned commit, and build
# args. The generic scripts/build-mirrored.sh reads this section to build
# the image on the host at deploy time (no BuildKit network issues).
repo = "mirrors/calino"
ref = "8e21e96ec842a426e714f78ff1f9cfa3e297c03b"
patch = "apps/calino/patches/proxy-auth-autoconnect.patch"
args.VITE_SITE_URL = "https://calino.${NODE_DOMAIN}"
args.CALINO_SELF_HOSTED = "true"
args.CALINO_SSO_CALDAV_URL = "https://calino.${NODE_DOMAIN}/dav/operator/"
args.CALINO_SSO_CALDAV_ACCOUNT_NAME = "Geth calendar"
args.CALINO_SSO_CALDAV_USERNAME = "operator"
