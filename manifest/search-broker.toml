# The node's single web-search capability. Agents discover this endpoint on the
# internal registry, but need AGENT_SEARCH_TOKEN to call it.

[app]
name = "search-broker"
version = "0.5.0"
description = "Concurrent Exa search with a structured, operator-only audit database"
image = "sovereign-node/search-broker:local"
ring = 0

[service]
port = 8080
api = "openapi.yaml"
mcp = "mcp-tools.json"
health = "/healthz"

[needs]
# The caller owns AGENT_SEARCH_TOKEN. The Exa credential is cold-upstream
# configuration held by the egress component, not an agent-visible credential.

[resources]
volumes = ["search_audit", "search_audit_db"]
database = "postgres"

[tests]
command = "python3 tests/smoke.py"
timeout_seconds = 60

[lifecycle]
# search_audit_db is a live Postgres data directory; it is pg_dump-ed by
# scripts/backup.sh instead of file-copied (see Consistent DB snapshots there).
backup = ["search_audit"]
update_policy = "staged"
