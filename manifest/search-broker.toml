# The node's single web-search capability. Agents discover this endpoint on the
# internal registry, but need AGENT_SEARCH_TOKEN to call it.

[app]
name = "search-broker"
version = "0.6.0"
description = "Concurrent Exa search with a structured, operator-only audit database"
# Versioned tag (not :local) so a version/ref bump makes the image "missing" and
# scripts/build-mirrored.sh rebuilds it — a fixed :local tag would never rebuild.
image = "sovereign-node/search-broker:0.6.0"
ring = 0

[service]
port = 8080
api = "openapi.yaml"
mcp = "mcp-tools.json"
health = "/healthz"

[needs]
# The caller owns AGENT_SEARCH_TOKEN. The Exa credential is cold-upstream
# configuration held by the egress component, not an agent-visible credential.

[resources]
volumes = ["search_audit", "search_audit_db"]
database = "postgres"

[tests]
command = "python3 tests/smoke.py"
timeout_seconds = 60

[lifecycle]
# search_audit_db is a live Postgres data directory; it is pg_dump-ed by
# scripts/backup.sh instead of file-copied (see Consistent DB snapshots there).
backup = ["search_audit"]
update_policy = "pinned"    # pinned to the [build].ref below; update by bumping
                            # version + ref together (same pattern as calino)

[build]
# First-party app source lives in Forgejo at apps/search-broker (seeded from
# app-skeleton). scripts/build-mirrored.sh clones this repo at the pinned commit
# and builds its Dockerfile on the host at deploy time. All four search-* services
# share this one image via ${SEARCH_BROKER_IMAGE}. No build args — the broker
# takes all config via runtime env, not build-time args.
# ref = HEAD of apps/search-broker with the CHAT_SEARCH_TOKEN capability fix (PR #2).
repo = "apps/search-broker"
ref = "12a297eefd959e742a4fc44022d256ea71d2f0b1"

[expose.chat]
# Chat tool surface for Open WebUI: the toolshim sits on the private `chat-tools`
# network (only Open WebUI and toolshims) and proxies to the search-broker on
# `search-chat`. The endpoint list IS the policy.
tools = "http://search-broker-toolshim:8101"
