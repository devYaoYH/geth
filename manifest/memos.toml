# Memos — the Keep-clone (docs/AGENT.md worked example). Upstream cached at
# mirrors/memos; image digest-pinned in compose.

[app]
name = "memos"
version = "stable"
description = "Google-Keep-style notes; ring 1 behind the door"
image = "neosmemo/memos"
ring = 1

[service]
port = 5230
api = "https://memos.apidocumentation.com/"   # upstream API contract
health = "/healthz"

[needs]
# Nothing internal. Data migration (Takeout import) is an ephemeral-task
# job with a Memos API token minted for that run — the caller declares.
# Human login is the door's business: OAuth2 IdP against the node IdP,
# seeded into Memos' DB by sso-setup.sh — not a `needs` credential.

# No [expose.chat]: memos is a pure HUMAN surface by operator decision
# (2026-07-18) — chat's model does not read these notes; Open WebUI's
# built-in notes is the model-facing scratchpad. The read-only toolshim
# from that experiment survives at apps/memos/toolshim as the reference
# implementation for docs/CHAT-TOOLS.md; re-wiring is one manifest line.

[resources]
volumes = ["memos_data"]
database = "none"     # embedded SQLite in the volume

[tests]
command = "curl -fsS $APP_URL/healthz"
timeout_seconds = 30

[lifecycle]
backup = ["memos_data"]
update_policy = "staged"
