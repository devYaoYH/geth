# The SUT source allowlist. A node-config PR can control Compose, but it may
# not cause the host controller to clone arbitrary private Forgejo repositories
# into its test VM. Add a source here in the same reviewed PR that introduces
# a new locally-built image.

[[source]]
name = "search-broker"
image = "sovereign-node/search-broker:local"
repo = "apps/search-broker"
ref = "12a297eefd959e742a4fc44022d256ea71d2f0b1"

