# The doorbell runner — a DELIBERATELY POWERLESS forgejo-runner.
#
# Not part of the node's docker-compose.yml core plane: it is operator-run
# host infrastructure (like the dispatcher launchd job), started separately so
# its blast radius is obvious and it never rides a node `up`. Bring it up with:
#   DISPATCH_SPOOL=<abs path> docker compose -f host/dispatch/runner.compose.yml up -d
# (scripts/up.sh sets DISPATCH_SPOOL for you.) Register first — see register.sh,
# which mints a REPO-SCOPED token via the admin API (no UI).
#
# Why it is safe to let it execute agent-pushable workflow YAML:
#   - HOST execution mode, NO docker socket mounted → it cannot spawn a
#     privileged container, cannot reach the daemon, cannot become ring-0.
#   - Holds NO node secrets (no master key, no .env) — only its own runner
#     registration identity, which authorizes registration, not inference.
#   - Joins the `agents` network ONLY: internal (no internet), and its purpose
#     there is to reach forgejo:3000 for job polling. It shares that net with
#     litellm, but holds no LLM key, so inference calls 401. A hostile pushed
#     workflow is boxed into: write /spool markers (dispatcher rejects forged
#     ones) and use its repo-scoped job token on coordination (mischief already
#     within any agent's write). A dedicated forgejo-only net would drop even
#     the litellm line of sight — noted as a hardening follow-up.
#   - The one job it is meant to run writes a bare integer to /spool. That's it.

services:
  doorbell-runner:
    image: code.forgejo.org/forgejo/runner:6.0.1
    container_name: doorbell-runner
    restart: unless-stopped
    command: ["forgejo-runner", "daemon", "--config", "/config.yml"]
    environment:
      GITEA_INSTANCE_URL: http://forgejo:3000   # the node-internal address, not the door
    volumes:
      - ./runner-config.yml:/config.yml:ro
      - doorbell_runner_data:/data
      # The spool is a HOST directory shared with the launchd dispatcher: the
      # runner writes markers here, the dispatcher watches + clears them.
      # DISPATCH_SPOOL must be an absolute host path (up.sh / install-launchd set it).
      - ${DISPATCH_SPOOL:?set DISPATCH_SPOOL to an absolute host path}:/spool
    networks: [agents]
    user: "10002:10002"                          # unprivileged; not the agent uid

networks:
  agents:
    name: sovereign-node_agents                  # the node's existing egress-less net
    external: true

volumes:
  doorbell_runner_data:
    # Pin the exact name (no compose project prefix) so register.sh's raw
    # `docker run -v doorbell_runner_data` and this daemon share one volume.
    name: doorbell_runner_data
