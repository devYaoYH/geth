# App Manifest v0 — the per-app contract.
#
# The placement manifest (node.example.yaml) says WHERE things live.
# This file says WHAT an app is and HOW it may be called. Together they are the
# node's stable interface: apps target these contracts, and the executor
# underneath (docker compose today) is a replaceable detail.
#
# Principles encoded here:
#   - Deny by default: an app that declares nothing gets credentials for nothing.
#   - Credentials are minted FROM this file at install time — the manifest is
#     simultaneously documentation, permission request, and audit inventory.
#   - Format stays deliberately close to openhost.toml as a compatibility
#     target, not a dependency.

[app]
name = "meeting-notes"
version = "0.1.0"
description = "Notes with action-item extraction"
image = "forgejo.internal/apps/meeting-notes"   # built from local git; pin digest on deploy
ring = 1                                         # 0 operator-only | 1 trusted people | 2 public

[service]
# What this app EXPOSES. The node's service registry aggregates these blocks
# and answers "what exists on this node and what can I call" — service
# discovery for humans and agents alike.
port = 8080
api = "openapi.yaml"          # service-to-service contract, lives in the app repo
mcp = "mcp-tools.json"        # typed tool surface for agent consumers (optional)
health = "/healthz"

[needs]
# What this app CALLS. Each entry causes the installer to mint one scoped,
# individually revocable credential, injected as a secret at deploy.
# Nothing here = no internal credentials. Being on the network is never authz.
calendar = ["events.write"]        # can create events; cannot read others, cannot delete
llm = { models = ["claude-haiku"], budget_usd = 2.0 }   # a LiteLLM virtual key

[resources]
# Packaged dependencies, Boq-style: declare, don't hand-provision.
volumes = ["notes-data"]
database = "none"                  # none | sqlite | postgres (installer provisions)

[tests]
# Executed by the harness against a STAGING instance of the node before any
# promotion to prod. The ops agent's change pipeline refuses to promote on red.
command = "pytest tests/ --base-url $APP_URL"
timeout_seconds = 300

[lifecycle]
backup = ["notes-data"]            # volumes restic must include
update_policy = "staged"           # staged = via change pipeline | pinned = manual only
