# Forgecode provider config for jail tenants (entrypoint links this into
# the workspace repo root as .forge.toml, untracked). ONE provider: the
# node's LiteLLM gateway — model FAMILIES are a model_id switch (aliases
# from the tenant's virtual-key allowlist, `forge list models`), never a
# harness or provider change. The key arrives by env var name, per the
# secrets-by-name rule; forge reads it at runtime.

[[providers]]
id            = "litellm"
url           = "http://litellm:4000/v1/chat/completions"
api_key_vars  = "OPENAI_API_KEY"
response_type = "OpenAI"
auth_methods  = ["api_key"]

[session]
provider_id = "litellm"
model_id    = "claude-sonnet"
