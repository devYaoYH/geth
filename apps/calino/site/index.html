<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calino — CalDAV Web Client</title>
<style>
:root {
  --bg: #f8fafc; --card: #fff; --border: #e2e8f0;
  --text: #1e293b; --muted: #64748b; --accent: #3b82f6;
  --accent-hover: #2563eb; --danger: #ef4444; --success: #22c55e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5; }
.container { max-width: 960px; margin: 0 auto; padding: 1.5rem; }

/* Login */
#login { max-width: 400px; margin: 4rem auto; }
#login h1 { text-align: center; margin-bottom: 1.5rem; font-size: 1.5rem; }
#login h1 small { display: block; font-size: 0.8rem; color: var(--muted); font-weight: 400; }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.25rem; }
.form-group input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--border);
  border-radius: 6px; font-size: 0.875rem; }
.form-group input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
.btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.5rem 1rem;
  border: none; border-radius: 6px; font-size: 0.875rem; font-weight: 500; cursor: pointer;
  transition: background 0.15s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { background: var(--bg); }
.btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; }
.btn-danger { background: var(--danger); color: #fff; }
.form-actions { display: flex; gap: 0.5rem; margin-top: 1.5rem; }
.error { color: var(--danger); font-size: 0.875rem; margin-top: 0.5rem; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
.header h1 { font-size: 1.25rem; }
.header-actions { display: flex; gap: 0.5rem; align-items: center; }

/* Calendar selector */
.cal-selector { margin-bottom: 1rem; }
.cal-selector select { padding: 0.375rem 0.75rem; border: 1px solid var(--border);
  border-radius: 6px; font-size: 0.875rem; background: var(--card); width: 100%; }

/* Calendar grid */
.cal-nav { display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem; }
.cal-nav h2 { font-size: 1.125rem; font-weight: 600; }
.cal-nav .nav-btns { display: flex; gap: 0.25rem; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px;
  background: var(--border); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.cal-header { background: var(--card); padding: 0.5rem; text-align: center;
  font-size: 0.75rem; font-weight: 600; color: var(--muted); text-transform: uppercase; }
.cal-day { background: var(--card); min-height: 100px; padding: 0.375rem; cursor: pointer;
  transition: background 0.1s; }
.cal-day:hover { background: #f1f5f9; }
.cal-day.other-month { opacity: 0.4; }
.cal-day.today { background: #eff6ff; }
.cal-day .day-num { font-size: 0.75rem; font-weight: 600; color: var(--muted);
  margin-bottom: 0.25rem; }
.cal-day.today .day-num { color: var(--accent); }
.cal-event { font-size: 0.6875rem; padding: 0.125rem 0.25rem; margin-bottom: 0.125rem;
  border-radius: 3px; background: #dbeafe; color: #1e40af; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
.cal-event:hover { background: #bfdbfe; }

/* Event list view */
.event-list { margin-top: 1rem; }
.event-item { display: flex; align-items: flex-start; gap: 0.75rem;
  padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px;
  margin-bottom: 0.5rem; background: var(--card); cursor: pointer; }
.event-item:hover { border-color: var(--accent); }
.event-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 0.375rem;
  flex-shrink: 0; }
.event-info { flex: 1; min-width: 0; }
.event-info .event-title { font-weight: 500; font-size: 0.875rem; }
.event-info .event-time { font-size: 0.75rem; color: var(--muted); }
.event-info .event-desc { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal { background: var(--card); border-radius: 12px; padding: 1.5rem; width: 90%;
  max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal h2 { font-size: 1.125rem; margin-bottom: 1rem; }
.modal-actions { display: flex; gap: 0.5rem; margin-top: 1.5rem;
  justify-content: flex-end; }
.modal textarea { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--border);
  border-radius: 6px; font-size: 0.875rem; font-family: inherit; resize: vertical;
  min-height: 60px; }
.modal textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }

/* Status */
.status { display: none; padding: 0.5rem 0.75rem; border-radius: 6px;
  font-size: 0.8125rem; margin-bottom: 1rem; }
.status.success { display: block; background: #f0fdf4; color: #166534;
  border: 1px solid #bbf7d0; }
.status.error { display: block; background: #fef2f2; color: #991b1b;
  border: 1px solid #fecaca; }
.status.info { display: block; background: #eff6ff; color: #1e40af;
  border: 1px solid #bfdbfe; }

@media (max-width: 640px) {
  .cal-grid { grid-template-columns: repeat(7, 1fr); }
  .cal-day { min-height: 60px; }
  .container { padding: 0.75rem; }
}
</style>
</head>
<body>
<div id="login" class="container">
  <h1>Calino <small>CalDAV Web Client</small></h1>
  <div class="form-group">
    <label for="serverUrl">CalDAV Server URL</label>
    <input type="url" id="serverUrl" placeholder="https://cal.example.com/">
  </div>
  <div class="form-group">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="operator">
  </div>
  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="App password">
  </div>
  <div class="error" id="loginError"></div>
  <div class="form-actions">
    <button class="btn btn-primary" id="connectBtn">Connect</button>
  </div>
</div>

<div id="app" class="container" style="display:none">
  <div class="header">
    <h1>Calino</h1>
    <div class="header-actions">
      <button class="btn btn-outline btn-sm" id="todayBtn">Today</button>
      <button class="btn btn-outline btn-sm" id="addEventBtn">+ New</button>
      <button class="btn btn-outline btn-sm" id="logoutBtn">Disconnect</button>
    </div>
  </div>
  <div class="status" id="status"></div>
  <div class="cal-selector">
    <select id="calendarSelect"></select>
  </div>
  <div class="cal-nav">
    <div class="nav-btns">
      <button class="btn btn-outline btn-sm" id="prevBtn">&larr;</button>
      <button class="btn btn-outline btn-sm" id="nextBtn">&rarr;</button>
    </div>
    <h2 id="monthLabel"></h2>
    <div class="nav-btns">
      <button class="btn btn-outline btn-sm" id="monthViewBtn">Month</button>
      <button class="btn btn-outline btn-sm" id="weekViewBtn">Week</button>
      <button class="btn btn-outline btn-sm" id="listViewBtn">List</button>
    </div>
  </div>
  <div id="calendarView"></div>
  <div id="eventListView" class="event-list" style="display:none"></div>
</div>

<div class="modal-overlay" id="eventModal">
  <div class="modal">
    <h2 id="modalTitle">Event</h2>
    <div class="form-group">
      <label for="eventTitle">Title</label>
      <input type="text" id="eventTitle" placeholder="Event title">
    </div>
    <div class="form-group">
      <label for="eventDate">Date</label>
      <input type="date" id="eventDate">
    </div>
    <div class="form-group">
      <label for="eventStart">Start</label>
      <input type="time" id="eventStart" value="09:00">
    </div>
    <div class="form-group">
      <label for="eventEnd">End</label>
      <input type="time" id="eventEnd" value="10:00">
    </div>
    <div class="form-group">
      <label for="eventDesc">Description</label>
      <textarea id="eventDesc" rows="3" placeholder="Optional description"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="deleteEventBtn" style="margin-right:auto">Delete</button>
      <button class="btn btn-outline" id="cancelModalBtn">Cancel</button>
      <button class="btn btn-primary" id="saveEventBtn">Save</button>
    </div>
  </div>
</div>

<script>
// ---- State ----
let state = {
  serverUrl: '',
  username: '',
  password: '',
  calendars: [],
  selectedCalendar: null,
  currentDate: new Date(),
  viewMode: 'month', // month | week | list
  events: [],
  editingEvent: null,
  editingHref: null,
};

// ---- Helpers ----
const btoa = (s) => window.btoa(unescape(encodeURIComponent(s)));
const authHeader = () => 'Basic ' + btoa(state.username + ':' + state.password);

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}

function showError(msg) {
  document.getElementById('loginError').textContent = msg;
}

function formatDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function parseLocalDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function formatTime(d) {
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function daysInMonth(year, month) {
  return new Date(year, month + 1, 0).getDate();
}

function restoreLogin() {
  try {
    const s = localStorage.getItem('calino-login');
    if (s) {
      const data = JSON.parse(s);
      document.getElementById('serverUrl').value = data.serverUrl || '';
      document.getElementById('username').value = data.username || '';
    }
  } catch(e) {}
}

function saveLogin() {
  localStorage.setItem('calino-login', JSON.stringify({
    serverUrl: state.serverUrl,
    username: state.username,
  }));
}

function clearLogin() {
  localStorage.removeItem('calino-login');
}

// ---- CalDAV API ----
async function caldavRequest(path, method, body, headers) {
  const url = state.serverUrl.replace(/\/+$/, '') + path;
  const resp = await fetch(url, {
    method: method || 'PROPFIND',
    headers: {
      'Authorization': authHeader(),
      'Depth': '1',
      'Content-Type': 'application/xml; charset="utf-8"',
      ...(headers || {}),
    },
    body: body || null,
  });
  if (!resp.ok) {
    const text = await resp.text().catch(() => '');
    throw new Error('HTTP ' + resp.status + (text ? ': ' + text.slice(0,200) : ''));
  }
  return resp;
}

function parseXml(text) {
  const parser = new DOMParser();
  return parser.parseFromString(text, 'text/xml');
}

// PROPFIND to discover calendars
async function fetchCalendars() {
  const body = `<?xml version="1.0" encoding="utf-8"?>
<d:propfind xmlns:d="DAV:" xmlns:cs="http://calendarserver.org/ns/">
  <d:prop>
    <d:displayname/>
    <cs:getctag/>
    <d:resourcetype/>
  </d:prop>
</d:propfind>`;
  const resp = await caldavRequest('/', 'PROPFIND', body);
  const text = await resp.text();
  const xml = parseXml(text);
  const responses = xml.querySelectorAll('d\\:response');
  const calendars = [];
  for (const resp of responses) {
    const href = resp.querySelector('d\\:href');
    const types = resp.querySelector('d\\:resourcetype');
    if (!href || !types) continue;
    if (types.querySelector('calendar\\:calendar') || types.querySelector('\\:calendar')) {
      const dn = resp.querySelector('d\\:displayname');
      const ctag = resp.querySelector('cs\\:getctag') || resp.querySelector('\\:getctag');
      calendars.push({
        href: href.textContent,
        displayName: dn ? dn.textContent : href.textContent.split('/').filter(Boolean).pop(),
        ctag: ctag ? ctag.textContent : '',
      });
    }
  }
  return calendars;
}

// REPORT to fetch events in a date range
async function fetchEvents(calendarHref, startDate, endDate) {
  const startStr = startDate.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
  const endStr = endDate.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
  const body = `<?xml version="1.0" encoding="utf-8"?>
<d:calendar-query xmlns:d="DAV:" xmlns:c="urn:ietf:params:xml:ns:caldav">
  <d:prop>
    <d:getetag/>
    <c:calendar-data/>
  </d:prop>
  <d:filter>
    <c:comp-filter name="VCALENDAR">
      <c:comp-filter name="VEVENT">
        <c:time-range start="${startStr}" end="${endStr}"/>
      </c:comp-filter>
    </c:comp-filter>
  </d:filter>
</d:calendar-query>`;
  const resp = await caldavRequest(calendarHref, 'REPORT', body, {
    'Content-Type': 'application/xml; charset="utf-8"',
    Depth: '1',
  });
  const text = await resp.text();
  const xml = parseXml(text);
  const responses = xml.querySelectorAll('d\\:response');
  const events = [];
  for (const resp of responses) {
    const href = resp.querySelector('d\\:href');
    const etag = resp.querySelector('d\\:getetag');
    const data = resp.querySelector('c\\:calendar-data') || resp.querySelector('\\:calendar-data');
    if (!href) continue;
    events.push({
      href: href.textContent,
      etag: etag ? etag.textContent : '',
      icalData: data ? data.textContent : '',
    });
  }
  return events;
}

function parseICalEvent(icalData) {
  const lines = icalData.split('\n');
  let uid = '', summary = '', description = '', dtstart = '', dtend = '', dtstamp = '';
  let inEvent = false;
  for (const raw of lines) {
    const line = raw.replace(/\r$/, '');
    if (line === 'BEGIN:VEVENT') { inEvent = true; continue; }
    if (line === 'END:VEVENT') break;
    if (!inEvent) continue;
    if (line.startsWith('UID:')) uid = line.slice(4);
    else if (line.startsWith('SUMMARY:')) summary = line.slice(8);
    else if (line.startsWith('DESCRIPTION:')) description = line.slice(12);
    else if (line.startsWith('DTSTART')) dtstart = line;
    else if (line.startsWith('DTEND')) dtend = line;
    else if (line.startsWith('DTSTAMP')) dtstamp = line;
  }
  return { uid, summary, description, dtstart, dtend, dtstamp };
}

function parseICalDate(str) {
  // DTSTART:20260401T090000 or DTSTART;VALUE=DATE:20260401
  const val = str.includes(':') ? str.split(':').pop() : str;
  if (val.length === 8) {
    // DATE value
    const y = val.slice(0,4), m = val.slice(4,6), d = val.slice(6,8);
    return new Date(y, m-1, d);
  }
  // DATETIME value
  const datePart = val.slice(0,8);
  const timePart = val.slice(9,15);
  const y = datePart.slice(0,4), m = datePart.slice(4,6), d = datePart.slice(6,8);
  const h = timePart.slice(0,2), min = timePart.slice(2,4);
  return new Date(y, m-1, d, h, min);
}

function isAllDay(icalDtstart) {
  return icalDtstart.includes('VALUE=DATE');
}

function buildICalEvent(title, dateStr, startTime, endTime, desc, uid) {
  const dtstartVal = dateStr.replace(/-/g, '') + 'T' + startTime.replace(/:/g, '') + '00';
  const dtendVal = dateStr.replace(/-/g, '') + 'T' + endTime.replace(/:/g, '') + '00';
  const now = new Date().toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
  return [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Calino//EN',
    'BEGIN:VEVENT',
    'UID:' + (uid || crypto.randomUUID()),
    'DTSTAMP:' + now,
    'DTSTART:' + dtstartVal,
    'DTEND:' + dtendVal,
    'SUMMARY:' + title,
    ...(desc ? ['DESCRIPTION:' + desc] : []),
    'END:VEVENT',
    'END:VCALENDAR',
  ].join('\r\n');
}

// PUT to create/update event
async function saveEvent(calendarHref, eventHref, icalData) {
  const url = state.serverUrl.replace(/\/+$/, '') + eventHref;
  const method = 'PUT';
  const resp = await fetch(url, {
    method,
    headers: {
      'Authorization': authHeader(),
      'Content-Type': 'text/calendar; charset="utf-8"',
    },
    body: icalData,
  });
  if (!resp.ok) {
    const text = await resp.text().catch(() => '');
    throw new Error('HTTP ' + resp.status + (text ? ': ' + text.slice(0,200) : ''));
  }
  return resp;
}

// DELETE event
async function deleteEvent(calendarHref, eventHref) {
  const url = state.serverUrl.replace(/\/+$/, '') + eventHref;
  const resp = await fetch(url, {
    method: 'DELETE',
    headers: { 'Authorization': authHeader() },
  });
  if (!resp.ok) {
    const text = await resp.text().catch(() => '');
    throw new Error('HTTP ' + resp.status + (text ? ': ' + text.slice(0,200) : ''));
  }
  return resp;
}

// ---- UI Rendering ----
function renderMonth(year, month) {
  const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  const days = daysInMonth(year, month);
  const prevDays = daysInMonth(year, month - 1);
  const today = new Date();
  const todayStr = formatDate(today);

  let html = '<div class="cal-grid">';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
    html += '<div class="cal-header">' + d + '</div>';
  });

  // Previous month days
  const startOffset = firstDay;
  for (let i = startOffset - 1; i >= 0; i--) {
    const d = prevDays - i;
    const dateStr = formatDate(new Date(year, month - 1, d));
    html += '<div class="cal-day other-month" data-date="' + dateStr + '"><div class="day-num">' + d + '</div></div>';
  }

  // Current month
  for (let d = 1; d <= days; d++) {
    const dateStr = formatDate(new Date(year, month, d));
    const isToday = dateStr === todayStr ? ' today' : '';
    const cellEvents = state.events.filter(e => {
      const parsed = parseICalEvent(e.icalData);
      const dt = parseICalDate(parsed.dtstart);
      return formatDate(dt) === dateStr;
    });
    html += '<div class="cal-day' + isToday + '" data-date="' + dateStr + '">';
    html += '<div class="day-num">' + d + '</div>';
    for (const ev of cellEvents) {
      const parsed = parseICalEvent(ev.icalData);
      html += '<div class="cal-event" data-href="' + ev.href + '">' + escapeHtml(parsed.summary || '(no title)') + '</div>';
    }
    html += '</div>';
  }

  // Next month days to fill the grid
  const totalCells = startOffset + days;
  const remaining = (7 - totalCells % 7) % 7;
  for (let d = 1; d <= remaining; d++) {
    const dateStr = formatDate(new Date(year, month + 1, d));
    html += '<div class="cal-day other-month" data-date="' + dateStr + '"><div class="day-num">' + d + '</div></div>';
  }

  html += '</div>';
  return html;
}

function renderWeek(date) {
  // Get Monday of the week
  const d = new Date(date);
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1); // Monday
  const monday = new Date(d.setDate(diff));
  const today = new Date();
  const todayStr = formatDate(today);

  let html = '<div class="cal-grid">';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => {
    html += '<div class="cal-header">' + d + '</div>';
  });
  for (let i = 0; i < 7; i++) {
    const dt = new Date(monday);
    dt.setDate(monday.getDate() + i);
    const dateStr = formatDate(dt);
    const isToday = dateStr === todayStr ? ' today' : '';
    const cellEvents = state.events.filter(e => {
      const parsed = parseICalEvent(e.icalData);
      const evDate = parseICalDate(parsed.dtstart);
      return formatDate(evDate) === dateStr;
    });
    html += '<div class="cal-day' + isToday + '" data-date="' + dateStr + '">';
    html += '<div class="day-num">' + dt.getDate() + '</div>';
    for (const ev of cellEvents) {
      const parsed = parseICalEvent(ev.icalData);
      const time = isAllDay(parsed.dtstart) ? '' : formatTime(parseICalDate(parsed.dtstart));
      html += '<div class="cal-event" data-href="' + ev.href + '">' + escapeHtml(time ? time + ' ' + (parsed.summary || '') : (parsed.summary || '(no title)')) + '</div>';
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderListView() {
  const sorted = [...state.events].sort((a, b) => {
    const pa = parseICalEvent(a.icalData);
    const pb = parseICalEvent(b.icalData);
    return parseICalDate(pa.dtstart) - parseICalDate(pb.dtstart);
  });
  if (sorted.length === 0) {
    return '<p style="color:var(--muted);text-align:center;padding:2rem;">No events found</p>';
  }
  let html = '';
  for (const ev of sorted) {
    const parsed = parseICalEvent(ev.icalData);
    const dt = parseICalDate(parsed.dtstart);
    const time = isAllDay(parsed.dtstart) ? 'All day' : formatTime(dt);
    html += '<div class="event-item" data-href="' + ev.href + '">';
    html += '<div class="event-dot"></div>';
    html += '<div class="event-info">';
    html += '<div class="event-title">' + escapeHtml(parsed.summary || '(no title)') + '</div>';
    html += '<div class="event-time">' + formatDate(dt) + ' ' + time + '</div>';
    if (parsed.description) {
      html += '<div class="event-desc">' + escapeHtml(parsed.description) + '</div>';
    }
    html += '</div></div>';
  }
  return html;
}

function escapeHtml(s) {
  if (!s) return '';
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

function updateCalendar() {
  const year = state.currentDate.getFullYear();
  const month = state.currentDate.getMonth();
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('monthLabel').textContent = monthNames[month] + ' ' + year;

  const calView = document.getElementById('calendarView');
  const listView = document.getElementById('eventListView');

  if (state.viewMode === 'month') {
    calView.style.display = '';
    listView.style.display = 'none';
    calView.innerHTML = renderMonth(year, month);
  } else if (state.viewMode === 'week') {
    calView.style.display = '';
    listView.style.display = 'none';
    calView.innerHTML = renderWeek(state.currentDate);
  } else {
    calView.style.display = 'none';
    listView.style.display = '';
    listView.innerHTML = renderListView();
  }
}

async function loadEvents() {
  if (!state.selectedCalendar) return;
  showStatus('Loading events...', 'info');
  try {
    // Load events for the visible month (with padding)
    const year = state.currentDate.getFullYear();
    const month = state.currentDate.getMonth();
    const start = new Date(year, month - 1, 1);
    const end = new Date(year, month + 2, 0, 23, 59, 59);
    state.events = await fetchEvents(state.selectedCalendar, start, end);
    updateCalendar();
    showStatus('', '');
  } catch (e) {
    showStatus('Error loading events: ' + e.message, 'error');
  }
}

async function loadCalendars() {
  showStatus('Connecting...', 'info');
  try {
    state.calendars = await fetchCalendars();
    const select = document.getElementById('calendarSelect');
    select.innerHTML = '';
    if (state.calendars.length === 0) {
      select.innerHTML = '<option value="">No calendars found</option>';
      showStatus('No calendars found. Create one in Radicale first.', 'error');
      return;
    }
    for (const cal of state.calendars) {
      const opt = document.createElement('option');
      opt.value = cal.href;
      opt.textContent = cal.displayName;
      select.appendChild(opt);
    }
    state.selectedCalendar = state.calendars[0].href;
    await loadEvents();
  } catch (e) {
    showStatus('Error: ' + e.message, 'error');
  }
}

// ---- Modal ----
function openModal(event) {
  state.editingEvent = null;
  state.editingHref = null;
  document.getElementById('modalTitle').textContent = event ? 'Edit Event' : 'New Event';
  document.getElementById('eventTitle').value = event ? event.summary : '';
  document.getElementById('eventDate').value = event ? formatDate(event.date) : formatDate(new Date());
  document.getElementById('eventStart').value = event ? event.startTime : '09:00';
  document.getElementById('eventEnd').value = event ? event.endTime : '10:00';
  document.getElementById('eventDesc').value = event ? event.desc : '';
  document.getElementById('deleteEventBtn').style.display = event ? '' : 'none';
  state.editingEvent = event || null;
  state.editingHref = event ? event.href : null;
  document.getElementById('eventModal').classList.add('active');
}

function closeModal() {
  document.getElementById('eventModal').classList.remove('active');
  state.editingEvent = null;
  state.editingHref = null;
}

// ---- Connect ----
document.getElementById('connectBtn').addEventListener('click', async () => {
  const serverUrl = document.getElementById('serverUrl').value.trim();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if (!serverUrl || !username || !password) {
    showError('All fields are required');
    return;
  }
  showError('');
  state.serverUrl = serverUrl;
  state.username = username;
  state.password = password;
  saveLogin();
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = '';
  await loadCalendars();
});

// ---- Event delegation ----
document.getElementById('calendarView').addEventListener('click', (e) => {
  const day = e.target.closest('.cal-day');
  if (day) {
    const date = day.dataset.date;
    if (date) {
      document.getElementById('eventDate').value = date;
      openModal(null);
    }
  }
  const evEl = e.target.closest('.cal-event');
  if (evEl) {
    const href = evEl.dataset.href;
    const ev = state.events.find(e => e.href === href);
    if (ev) {
      const parsed = parseICalEvent(ev.icalData);
      const dt = parseICalDate(parsed.dtstart);
      const dtEnd = parseICalDate(parsed.dtend);
      openModal({
        href: ev.href,
        summary: parsed.summary,
        desc: parsed.description,
        date: dt,
        startTime: formatTime(dt),
        endTime: formatTime(dtEnd),
        icalData: ev.icalData,
      });
    }
  }
});

document.getElementById('eventListView').addEventListener('click', (e) => {
  const item = e.target.closest('.event-item');
  if (item) {
    const href = item.dataset.href;
    const ev = state.events.find(e => e.href === href);
    if (ev) {
      const parsed = parseICalEvent(ev.icalData);
      const dt = parseICalDate(parsed.dtstart);
      const dtEnd = parseICalDate(parsed.dtend);
      openModal({
        href: ev.href,
        summary: parsed.summary,
        desc: parsed.description,
        date: dt,
        startTime: formatTime(dt),
        endTime: formatTime(dtEnd),
        icalData: ev.icalData,
      });
    }
  }
});

// ---- Navigation ----
document.getElementById('prevBtn').addEventListener('click', () => {
  if (state.viewMode === 'month') {
    state.currentDate.setMonth(state.currentDate.getMonth() - 1);
  } else {
    state.currentDate.setDate(state.currentDate.getDate() - 7);
  }
  loadEvents();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (state.viewMode === 'month') {
    state.currentDate.setMonth(state.currentDate.getMonth() + 1);
  } else {
    state.currentDate.setDate(state.currentDate.getDate() + 7);
  }
  loadEvents();
});
document.getElementById('todayBtn').addEventListener('click', () => {
  state.currentDate = new Date();
  loadEvents();
});
document.getElementById('monthViewBtn').addEventListener('click', () => {
  state.viewMode = 'month';
  updateCalendar();
});
document.getElementById('weekViewBtn').addEventListener('click', () => {
  state.viewMode = 'week';
  updateCalendar();
});
document.getElementById('listViewBtn').addEventListener('click', () => {
  state.viewMode = 'list';
  updateCalendar();
});

// ---- Calendar selector ----
document.getElementById('calendarSelect').addEventListener('change', (e) => {
  state.selectedCalendar = e.target.value;
  loadEvents();
});

// ---- Add event button ----
document.getElementById('addEventBtn').addEventListener('click', () => {
  openModal(null);
});

// ---- Modal buttons ----
document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
document.getElementById('saveEventBtn').addEventListener('click', async () => {
  const title = document.getElementById('eventTitle').value.trim();
  const date = document.getElementById('eventDate').value;
  const start = document.getElementById('eventStart').value;
  const end = document.getElementById('eventEnd').value;
  const desc = document.getElementById('eventDesc').value.trim();
  if (!title || !date) { showStatus('Title and date required', 'error'); return; }

  try {
    const uid = state.editingHref ? null : undefined;
    const icalData = buildICalEvent(title, date, start, end, desc, uid);
    const eventHref = state.editingHref || (
      '/' + state.selectedCalendar.split('/').filter(Boolean).slice(0,-1).join('/') + '/' + crypto.randomUUID() + '.ics'
    );
    await saveEvent(state.selectedCalendar, eventHref, icalData);
    showStatus('Event saved', 'success');
    closeModal();
    await loadEvents();
  } catch (e) {
    showStatus('Error saving: ' + e.message, 'error');
  }
});
document.getElementById('deleteEventBtn').addEventListener('click', async () => {
  if (!state.editingHref) return;
  if (!confirm('Delete this event?')) return;
  try {
    await deleteEvent(state.selectedCalendar, state.editingHref);
    showStatus('Event deleted', 'success');
    closeModal();
    await loadEvents();
  } catch (e) {
    showStatus('Error deleting: ' + e.message, 'error');
  }
});

// ---- Logout ----
document.getElementById('logoutBtn').addEventListener('click', () => {
  clearLogin();
  state.password = '';
  document.getElementById('login').style.display = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('password').value = '';
});

// ---- Init ----
restoreLogin();
</script>
</body>
</html>
