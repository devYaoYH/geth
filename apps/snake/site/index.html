<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Snake</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #151924;
      --fg: #e5e7eb;
      --muted: #9aa4b2;
      --accent: #22c55e;
      --danger: #ef4444;
      --grid: #1f2430;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      display: grid;
      place-items: center;
    }
    .wrap {
      width: min(96vw, 780px);
      padding: 16px;
    }
    .card {
      background: var(--panel);
      border: 1px solid #202533;
      border-radius: 12px;
      padding: 16px 16px 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    h1 {
      font-size: 16px;
      margin: 0;
      letter-spacing: 0.4px;
      color: var(--muted);
    }
    .score {
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: var(--bg);
      border-radius: 10px;
      border: 1px solid #202533;
      image-rendering: pixelated;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }
    .overlay .panel {
      background: rgba(21,25,36,0.92);
      border: 1px solid #2a3142;
      padding: 18px 22px;
      border-radius: 10px;
      text-align: center;
      pointer-events: auto;
    }
    .title { font-size: 20px; font-weight: 700; margin: 0 0 6px; }
    .subtitle { color: var(--muted); margin: 0 0 10px; }
    .keys { color: var(--muted); font-size: 13px; }
    .accent { color: var(--accent); }
    .danger { color: var(--danger); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <header>
        <h1>Snake</h1>
        <div class="score" id="score">Score: 0</div>
      </header>
      <div style="position: relative">
        <canvas id="game" width="640" height="480" aria-label="Snake game canvas"></canvas>
        <div class="overlay" id="overlay" hidden>
          <div class="panel">
            <div class="title" id="stateTitle">Paused</div>
            <p class="subtitle" id="stateSubtitle"></p>
            <div class="keys">Arrows / WASD to move · Space to restart</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function(){
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const overlay = document.getElementById('overlay');
    const titleEl = document.getElementById('stateTitle');
    const subEl = document.getElementById('stateSubtitle');

    // Grid config
    const COLS = 32;          // 32 x 24 grid → 640x480 at 20px cell
    const ROWS = 24;
    const CELL = 20;

    // Timing
    const START_INTERVAL = 120;   // ms per step
    const MIN_INTERVAL = 65;      // cap
    const SPEEDUP_MS = 3;         // per food

    // Colors
    const COLORS = {
      bg: getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() || '#0f1117',
      grid: getComputedStyle(document.documentElement).getPropertyValue('--grid').trim() || '#1f2430',
      snake: '#22c55e',
      snakeHead: '#34d399',
      food: '#f59e0b',
      dead: '#ef4444'
    };

    // HiDPI crispness
    function resizeForDPR(){
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      const cssW = canvas.clientWidth || canvas.width;
      const cssH = Math.round(cssW * (ROWS/COLS));
      // Keep integer multiples of cells to avoid subpixel blur
      const targetW = Math.round(COLS * CELL);
      const targetH = Math.round(ROWS * CELL);
      canvas.style.height = (targetH * (cssW/targetW)) + 'px';
      canvas.width = targetW * dpr;
      canvas.height = targetH * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener('resize', resizeForDPR);
    resizeForDPR();

    // Game state
    let snake, dir, nextDir, food, score, interval, elapsed, running, dead, started;

    function rndCell(){
      return [Math.floor(Math.random()*COLS), Math.floor(Math.random()*ROWS)];
    }

    function reset(){
      snake = [ [Math.floor(COLS/2), Math.floor(ROWS/2)], [Math.floor(COLS/2)-1, Math.floor(ROWS/2)], [Math.floor(COLS/2)-2, Math.floor(ROWS/2)] ];
      dir = [1,0];
      nextDir = [1,0];
      food = placeFood();
      score = 0;
      interval = START_INTERVAL;
      elapsed = 0;
      running = false;
      dead = false;
      started = false;
      overlay.hidden = false;
      titleEl.textContent = 'Snake';
      subEl.innerHTML = 'Press <span class="accent">any key</span> to start';
      scoreEl.textContent = `Score: ${score}`;
    }

    function placeFood(){
      let f;
      do { f = rndCell(); } while (snake.some(s => s[0]===f[0] && s[1]===f[1]));
      return f;
    }

    function setDir(nx, ny){
      // Prevent 180° turns on the same tick
      if ((nx === -dir[0] && ny === -dir[1]) || (nx === dir[0] && ny === dir[1])) return;
      nextDir = [nx, ny];
    }

    window.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();

      // First keypress starts the game
      if (!started) {
        started = true;
        running = true;
        overlay.hidden = true;
        // Also process direction on the starting press
        if (k === 'arrowup' || k === 'w') setDir(0,-1);
        else if (k === 'arrowdown' || k === 's') setDir(0,1);
        else if (k === 'arrowleft' || k === 'a') setDir(-1,0);
        else if (k === 'arrowright' || k === 'd') setDir(1,0);
        return;
      }

      if (k === 'arrowup' || k === 'w') setDir(0,-1);
      else if (k === 'arrowdown' || k === 's') setDir(0,1);
      else if (k === 'arrowleft' || k === 'a') setDir(-1,0);
      else if (k === 'arrowright' || k === 'd') setDir(1,0);
      else if (k === ' ' || k === 'enter') {
        if (!running) { reset(); }
      }
    });

    function step(){
      dir = nextDir;
      const head = snake[0];
      const nx = head[0] + dir[0];
      const ny = head[1] + dir[1];

      // Collision with walls
      if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) {
        return die();
      }
      // Collision with self
      if (snake.some((s,i) => i>0 && s[0]===nx && s[1]===ny)) {
        return die();
      }

      // Move
      snake.unshift([nx, ny]);
      if (nx === food[0] && ny === food[1]){
        score += 1;
        scoreEl.textContent = `Score: ${score}`;
        food = placeFood();
        interval = Math.max(MIN_INTERVAL, interval - SPEEDUP_MS);
      } else {
        snake.pop();
      }
    }

    function die(){
      running = false;
      dead = true;
      overlay.hidden = false;
      titleEl.textContent = 'Game Over';
      subEl.innerHTML = `Score <span class="accent">${score}</span> · Press <span class="accent">Space</span> to restart`;
    }

    function draw(){
      // Clear
      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0,0,COLS*CELL,ROWS*CELL);
      // Grid (subtle)
      ctx.strokeStyle = COLORS.grid;
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let x=0; x<=COLS; x++){
        ctx.moveTo(x*CELL+0.5, 0);
        ctx.lineTo(x*CELL+0.5, ROWS*CELL);
      }
      for (let y=0; y<=ROWS; y++){
        ctx.moveTo(0, y*CELL+0.5);
        ctx.lineTo(COLS*CELL, y*CELL+0.5);
      }
      ctx.stroke();

      // Food
      ctx.fillStyle = COLORS.food;
      roundedRect(ctx, food[0]*CELL+3, food[1]*CELL+3, CELL-6, CELL-6, 4);

      // Snake
      for (let i=snake.length-1; i>=0; i--){
        const s = snake[i];
        const x = s[0]*CELL; const y = s[1]*CELL;
        if (i === 0){
          ctx.fillStyle = dead ? COLORS.dead : COLORS.snakeHead;
        } else {
          ctx.fillStyle = COLORS.snake;
        }
        roundedRect(ctx, x+2, y+2, CELL-4, CELL-4, 5);
      }
    }

    function roundedRect(ctx,x,y,w,h,r){
      ctx.beginPath();
      ctx.moveTo(x+r,y);
      ctx.arcTo(x+w,y,x+w,y+h,r);
      ctx.arcTo(x+w,y+h,x,y+h,r);
      ctx.arcTo(x,y+h,x,y,r);
      ctx.arcTo(x,y,x+w,y,r);
      ctx.closePath();
      ctx.fill();
    }

    let last = performance.now();
    reset(); // Show start overlay; game waits for keypress

    function loop(now){
      const dt = now - last;
      last = now;
      if (running){
        elapsed += dt;
        while (elapsed >= interval){
          elapsed -= interval;
          step();
          if (!running) break;
        }
      }
      draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
