# snake — an app fragment, merged into the node stack by the root
# docker-compose.yml `include:` list. This file owns everything snake:
# service, the networks it joins. Secrets would arrive BY NAME from
# secrets/snake.env (the include's env_file) — this app has none today.
# Shared networks re-declare the root's attributes exactly; compose merges.

services:
  # --- apps ring 1: snake -------------------------------------------------------
  # A tiny static site (canvas game) served by python http.server. Built
  # locally from ./site (no internet needed; upstream image already cached).
  snake:
    profiles: [on-demand]
    build: ./site
    image: sovereign-node/snake:local
    container_name: snake
    # OFF BY DEFAULT: on-demand apps must NOT auto-start. `restart: unless-stopped`
    # (like `always`) makes Docker resurrect the container after a daemon/host
    # reboot regardless of its profile — so once launched it would come back on
    # every boot. `no` keeps lifecycle entirely in the launcher's hands: a fresh
    # `docker compose up -d` (profile-gated) never starts it, a reboot never
    # revives it, and it runs only between an explicit launch and stop.
    restart: "no"
    networks: [front]

networks:
  front:
    internal: true
