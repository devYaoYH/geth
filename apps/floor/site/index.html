<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Floor</title>
<style>
  :root {
    --ink: #2b2338; --paper: #f4ede4; --brass: #d9a441; --screen: #7ce0d3;
    --bg0: #1d2231; --bg1: #252c40;
  }
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(ellipse at 50% 30%, var(--bg1), var(--bg0) 75%);
    color: var(--paper); overflow: hidden;
    font: 14px/1.45 "Avenir Next", "Segoe UI", system-ui, sans-serif;
  }
  canvas { display: block; width: 100vw; height: 100vh; cursor: grab; }
  canvas.dragging { cursor: grabbing; }

  #hud {
    position: fixed; top: 14px; left: 18px; pointer-events: none;
    text-shadow: 0 2px 8px rgba(0,0,0,.6);
  }
  #hud h1 { font-size: 19px; letter-spacing: .12em; text-transform: uppercase;
            color: var(--brass); font-weight: 600; }
  #hud .sub { font-size: 12px; opacity: .75; }
  #hud .eyebrow { color: var(--screen); font-size: 10px; font-weight: 700;
                  letter-spacing: .16em; text-transform: uppercase; margin-bottom: 2px; }

  #pulse {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; align-items: center; padding: 7px 11px;
    border: 1px solid rgba(124,224,211,.2); border-radius: 999px;
    background: rgba(21,26,40,.58); backdrop-filter: blur(9px);
    font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
    color: rgba(244,237,228,.72); pointer-events: none;
  }
  #pulse .beacon { width: 7px; height: 7px; border-radius: 50%; background: #8ac926;
                    box-shadow: 0 0 0 0 rgba(138,201,38,.55); animation: beacon 1.9s infinite; }
  #pulse .metric { color: var(--brass); font-weight: 700; }
  @keyframes beacon { 70% { box-shadow: 0 0 0 7px rgba(138,201,38,0); } 100% { box-shadow: 0 0 0 0 rgba(138,201,38,0); } }

  #ticker {
    position: fixed; left: 18px; bottom: 14px; max-width: 46ch;
    display: flex; flex-direction: column-reverse; gap: 4px; pointer-events: none;
  }
  #ticker .ev {
    font-size: 12px; padding: 4px 10px; border-radius: 6px;
    background: rgba(29, 34, 49, .82); border-left: 3px solid var(--brass);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    animation: evin .3s ease-out;
  }
  #ticker .ev.llm { border-color: #ffd166; }
  #ticker .ev.git, #ticker .ev.pr { border-color: #ef6461; }
  #ticker .ev.issue { border-color: #9b5de5; }
  #ticker .ev.lifecycle { border-color: #4ea8de; }
  @keyframes evin { from { opacity: 0; transform: translateY(6px); } }

  #sources {
    position: fixed; right: 18px; bottom: 14px; font-size: 11px;
    background: rgba(29, 34, 49, .82); border-radius: 8px; padding: 8px 12px;
    pointer-events: none;
  }
  #sources .src { display: flex; align-items: center; gap: 6px; }
  #sources .dot { width: 7px; height: 7px; border-radius: 50%; background: #8ac926; }
  #sources .dot.off { background: #5b667e; }
  #sources .dot.err { background: #ef6461; }

  #tip {
    position: fixed; display: none; pointer-events: none; z-index: 5;
    background: rgba(29, 34, 49, .95); border: 1px solid var(--brass);
    border-radius: 8px; padding: 8px 12px; max-width: 34ch;
    box-shadow: 0 6px 24px rgba(0,0,0,.5);
  }
  #tip b { color: var(--brass); }
  #tip .state {
    font-size: 11.5px; color: var(--paper); display: flex; align-items: center;
    gap: 6px; margin: 3px 0 4px;
  }
  #tip .state .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  #tip .blurb { font-size: 12px; opacity: .8; }

  #legend {
    position: fixed; top: 14px; right: 18px; font-size: 11px; text-align: right;
    opacity: .7; pointer-events: none; text-shadow: 0 2px 8px rgba(0,0,0,.6);
  }
  /* Log panel — appears when you click an agent / task room */
  #logpanel {
    position: fixed; bottom: 0; right: 0; width: min(640px, 100vw);
    height: min(420px, 55vh); z-index: 20;
    background: rgba(18, 21, 33, .96); border-top: 2px solid var(--brass);
    border-left: 2px solid var(--brass); border-radius: 8px 0 0 0;
    display: none; flex-direction: column;
    box-shadow: -4px -4px 24px rgba(0,0,0,.5);
    font: 12px/1.55 "SF Mono", "Consolas", "Menlo", monospace;
  }
  #logpanel.open { display: flex; }
  #logpanel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 12px; border-bottom: 1px solid rgba(217,164,65,.3);
    flex: none;
  }
  #logpanel-title { color: var(--brass); font-size: 12px; font-weight: 600; }
  #logpanel-close {
    background: none; border: none; color: var(--paper); cursor: pointer;
    font-size: 18px; line-height: 1; opacity: .7; padding: 0 2px;
  }
  #logpanel-close:hover { opacity: 1; color: var(--brass); }
  #logpanel-body {
    flex: 1; overflow-y: auto; padding: 8px 12px;
    color: rgba(244, 237, 228, 0.85); white-space: pre-wrap; word-break: break-all;
  }
  #logpanel-body .logline { display: block; }
  #logpanel-body .logline.spinner { color: rgba(217,164,65,.55); }
  #logpanel-status {
    padding: 3px 12px 5px; font-size: 10.5px; color: rgba(244,237,228,.4);
    flex: none; border-top: 1px solid rgba(217,164,65,.15);
  }

  #inspector {
    position: fixed; right: 18px; top: 52px; width: 258px; display: none;
    padding: 13px 14px 12px; border: 1px solid rgba(217,164,65,.55); border-radius: 10px;
    background: rgba(22,27,42,.91); box-shadow: 0 12px 40px rgba(0,0,0,.35);
    backdrop-filter: blur(12px);
  }
  #inspector.open { display: block; animation: inspector-in .18s ease-out; }
  @keyframes inspector-in { from { opacity: 0; transform: translateY(-5px); } }
  #inspector .kicker { color: var(--screen); font-size: 9px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; }
  #inspector h2 { color: var(--brass); font-size: 16px; margin: 2px 0 5px; line-height: 1.2; }
  #inspector p { color: rgba(244,237,228,.78); font-size: 12px; margin: 0 0 9px; }
  #inspector .line { display: flex; justify-content: space-between; gap: 10px; padding-top: 6px;
                      border-top: 1px solid rgba(244,237,228,.1); font-size: 11px; }
  #inspector .line span:last-child { color: var(--screen); text-align: right; }
  #inspector button { position: absolute; right: 8px; top: 7px; border: 0; color: var(--paper);
                      background: transparent; font-size: 18px; cursor: pointer; line-height: 1; }
  #inspector button:hover { color: var(--brass); }
  @media (max-width: 720px) {
    #pulse { top: 50px; max-width: calc(100vw - 36px); }
    #legend { display: none; }
    #inspector { left: 18px; right: 18px; top: auto; bottom: 88px; width: auto; }
  }
</style>
</head>
<body>
<canvas id="floor"></canvas>
<div id="hud">
  <div class="eyebrow">Sovereign node · live topology</div>
  <h1>The Floor</h1>
  <div class="sub" id="nodeline">warming up…</div>
</div>
<div id="pulse"><span class="beacon"></span><span id="pulsecopy">awaiting topology</span></div>
<div id="legend">drag to pan · wheel to zoom · click a room to trace its paths · click agent/task for logs</div>
<div id="ticker"></div>
<div id="sources"></div>
<div id="tip"></div>
<aside id="inspector" aria-live="polite"></aside>
<div id="logpanel">
  <div id="logpanel-header">
    <span id="logpanel-title">logs</span>
    <button id="logpanel-close" title="Close log panel">&#x2715;</button>
  </div>
  <div id="logpanel-body"></div>
  <div id="logpanel-status">connecting…</div>
</div>
<script src="iso.js"></script>
</body>
</html>
