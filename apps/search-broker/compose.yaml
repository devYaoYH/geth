# search-broker — capability-gated Exa search with a separate durable audit
# plane. The broker can write audit rows; the dashboard API can only read them.
# Neither the agent spur nor the egress companion can reach the audit dashboard.

services:
  search-audit-db:
    profiles: [apps]
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    container_name: search-audit-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: search_audit
      POSTGRES_USER: search_audit_owner
      POSTGRES_PASSWORD: ${SEARCH_AUDIT_DB_OWNER_PASSWORD:-}
      SEARCH_AUDIT_DB_WRITER_PASSWORD: ${SEARCH_AUDIT_DB_WRITER_PASSWORD:-}
      SEARCH_AUDIT_DB_READER_PASSWORD: ${SEARCH_AUDIT_DB_READER_PASSWORD:-}
    volumes:
      - search_audit_db:/var/lib/postgresql/data
      - ./apps/search-broker/db-init:/docker-entrypoint-initdb.d:ro
    networks: [search-data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U search_audit_owner -d search_audit"]
      interval: 10s
      timeout: 3s
      retries: 12

  search-broker:
    profiles: [apps]
    image: ${SEARCH_BROKER_IMAGE:-sovereign-node/search-broker:local}
    container_name: search-broker
    restart: unless-stopped
    depends_on:
      search-egress:
        condition: service_healthy
      search-audit-db:
        condition: service_healthy
    environment:
      SEARCH_ROLE: broker
      PORT: "8080"
      AGENT_SEARCH_TOKEN: ${AGENT_SEARCH_TOKEN:-}
      SEARCH_AUDIT_DATABASE_URL: postgresql://search_audit_writer:${SEARCH_AUDIT_DB_WRITER_PASSWORD:-}@search-audit-db:5432/search_audit
      SEARCH_EGRESS_TOKEN: ${SEARCH_EGRESS_TOKEN:-}
      SEARCH_CAPABILITY_ID: agent-dev
      SEARCH_EGRESS_URL: http://search-egress:8081
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    networks: [agents, search-private, search-data]

  search-audit-api:
    profiles: [apps]
    image: ${SEARCH_BROKER_IMAGE:-sovereign-node/search-broker:local}
    container_name: search-audit-api
    restart: unless-stopped
    depends_on:
      search-audit-db:
        condition: service_healthy
    environment:
      SEARCH_ROLE: audit-api
      PORT: "8082"
      SEARCH_AUDIT_TOKEN: ${SEARCH_AUDIT_TOKEN:-}
      SEARCH_AUDIT_DATABASE_URL: postgresql://search_audit_reader:${SEARCH_AUDIT_DB_READER_PASSWORD:-}@search-audit-db:5432/search_audit
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    networks: [search-admin, search-data]

  search-egress:
    profiles: [apps]
    image: ${SEARCH_BROKER_IMAGE:-sovereign-node/search-broker:local}
    container_name: search-egress
    restart: unless-stopped
    environment:
      SEARCH_ROLE: egress
      PORT: "8081"
      EXA_API_KEY: ${EXA_API_KEY:-}
      SEARCH_EGRESS_TOKEN: ${SEARCH_EGRESS_TOKEN:-}
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    networks: [search-private, edge]

  search-audit-migrate:
    profiles: [migrate]
    image: ${SEARCH_BROKER_IMAGE:-sovereign-node/search-broker:local}
    container_name: search-audit-migrate
    restart: "no"
    depends_on:
      search-audit-db:
        condition: service_healthy
    command: ["python3", "migrate_legacy.py"]
    environment:
      SEARCH_AUDIT_DATABASE_URL: postgresql://search_audit_owner:${SEARCH_AUDIT_DB_OWNER_PASSWORD:-}@search-audit-db:5432/search_audit
      LEGACY_AUDIT_LOG: /legacy/search.jsonl
      DRY_RUN: ${SEARCH_AUDIT_MIGRATE_DRY_RUN:-true}
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]
    cap_drop: [ALL]
    volumes:
      - search_audit:/legacy:ro
    networks: [search-data]

networks:
  agents:
    internal: true
  edge:
  search-private:
    internal: true
  search-admin:
    # Caddy <-> audit API only: operator dashboard traffic never enters agents.
    internal: true
  search-data:
    # Broker/audit API <-> database only. The database has no edge route.
    internal: true

volumes:
  search_audit:
  search_audit_db:
