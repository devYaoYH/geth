name: sovereign-node

# Trust boundaries are enforced by networks, not by good intentions.
#   edge     — only things Caddy is allowed to reach. Caddy is the sole ingress.
#   litellm  — LiteLLM <-> its database. Nothing else can reach Postgres.
#   agents   — the agent spur: agent runtimes NEVER join `edge`; they join
#              this network, where the only listeners are the services their
#              manifest `needs` declared (today: LiteLLM inference, Forgejo
#              git). Never databases, never the docker socket.

# --- app fragments -----------------------------------------------------------
# Each app on the node is a self-contained fragment: apps/<name>/compose.yaml
# (service + networks + volumes), apps/<name>/route.caddy (its door), and a
# host-only secrets/<name>.env the include's env_file feeds to interpolation.
# Adding an app touches its own directory plus one line here — concurrent
# app PRs do not collide. Core node plane (ingress, identity, LLM gateway,
# git, tenants) stays in THIS file.
include:
  - path: apps/radicale/compose.yaml
    env_file: secrets/radicale.env
  - path: apps/memos/compose.yaml
    env_file: secrets/memos.env
  - path: apps/miniflux/compose.yaml
    env_file: secrets/miniflux.env
  - path: apps/open-webui/compose.yaml
    env_file: secrets/open-webui.env
  - path: apps/gog-bridge/compose.yaml
    env_file: secrets/gog-bridge.env
  - path: apps/snake/compose.yaml
    env_file: secrets/snake.env

networks:
  edge:
  front:
    # Egress-less browser surfaces (today: open-webui). Caddy routes IN, the
    # app reaches LiteLLM and the IdP (via Caddy's alias below) — and nothing
    # else: internal means no internet route, the same structural guarantee
    # the agents spur has. Apps join `front` unless they genuinely need
    # egress (miniflux fetches feeds; that's what `edge` is for).
    internal: true
  litellm:
  dockerwatch:
    # homepage <-> docker-proxy ONLY: read-only container status for the
    # dashboard. The raw socket never enters a routed container.
    internal: true
  agents:
    # internal: agents get NO direct internet. The only egress from the spur
    # is LiteLLM (which reaches providers via `edge`). An injected agent that
    # has read your data still has nowhere to send it — upstream code arrives
    # via operator-run mirrors (scripts/mirror.sh), never direct fetch.
    internal: true

volumes:
  caddy_data:
  caddy_config:
  litellm_db:
  forgejo_data:
  pocketid_data:
  agent_workspace:
  assistant_workspace:

services:
  caddy:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      NODE_DOMAIN: ${NODE_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      # default TEST-NET-1 = matches nothing real; set real CIDRs in .env
      EXTRA_TRUSTED_RANGES: ${EXTRA_TRUSTED_RANGES:-192.0.2.0/32}
      # Injected on web-UI paths to Radicale (apps/radicale/route.caddy)
      # so the browser never sees the htpasswd login form. Value is base64
      # of "operator:<RADICALE_TOOL_PASSWORD>"; minted in secrets/radicale.env.
      RADICALE_WEB_AUTH: ${RADICALE_WEB_AUTH:-}
    volumes:
      - ./caddy:/etc/caddy:ro     # Caddyfile + untracked local/*.caddy overrides
      # app fragments' route.caddy files; /etc/caddy is itself a ro mount, so
      # they land beside it and the Caddyfile imports by absolute path
      - ./apps:/srv/apps:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      edge:
      front:
        # The IdP's hostname resolves to Caddy on the internal net, so
        # egress-less apps still complete server-side OIDC (token/userinfo)
        # by hairpinning through the door — with the real certificate.
        aliases: ["auth.${NODE_DOMAIN}"]

  litellm:
    # Digest-pinned (as is every image here). To update: scripts/pin-images.sh,
    # review the diff, commit. Rollback = git revert + docker compose up -d.
    image: ghcr.io/berriai/litellm:main-stable@sha256:9ef6f45bc0104940571765e610c52a1d761b5ec85efcd193795281086ee61277
    container_name: litellm
    restart: unless-stopped
    depends_on:
      - litellm-db
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      DATABASE_URL: postgresql://litellm:${LITELLM_DB_PASSWORD}@litellm-db:5432/litellm
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}   # ring 0 — admin only
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}       # set once, never rotate casually
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      STORE_MODEL_IN_DB: "True"
      # Admin UI SSO via the node IdP (scripts/sso-setup.sh mints the client).
      # API auth is unchanged: virtual keys. Only humans log in via OIDC.
      PROXY_BASE_URL: https://llm.${NODE_DOMAIN}
      GENERIC_CLIENT_ID: ${LITELLM_OIDC_CLIENT_ID:-}
      GENERIC_CLIENT_SECRET: ${LITELLM_OIDC_CLIENT_SECRET:-}
      GENERIC_AUTHORIZATION_ENDPOINT: https://auth.${NODE_DOMAIN}/authorize
      GENERIC_TOKEN_ENDPOINT: https://auth.${NODE_DOMAIN}/api/oidc/token
      GENERIC_USERINFO_ENDPOINT: https://auth.${NODE_DOMAIN}/api/oidc/userinfo
      GENERIC_SCOPE: openid profile email
      # Key SSO users by the OIDC `sub` claim (Pocket ID user UUID) — must
      # match PROXY_ADMIN_ID, which sso-setup.sh mints as exactly that UUID.
      # LiteLLM's default (preferred_username) silently creates a new viewer.
      GENERIC_USER_ID_ATTRIBUTE: sub
      PROXY_ADMIN_ID: ${LITELLM_PROXY_ADMIN_ID:-}
    volumes:
      - ./config/litellm.yaml:/app/config.yaml:ro
    networks: [edge, litellm, agents, front]   # agents + front apps call inference here, by virtual key

  litellm-db:
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    container_name: litellm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD}
    volumes:
      - litellm_db:/var/lib/postgresql/data
    networks: [litellm]

  forgejo:
    image: codeberg.org/forgejo/forgejo:11@sha256:946243edbab116d5bb78b73ea68af6f3d69229ba1b1ed958dd82c3481167f3e0
    container_name: forgejo
    restart: unless-stopped
    # Entire config is declared here (env -> app.ini); the web installer never
    # runs. State lives ONLY in the forgejo_data volume, which is in the restic
    # include list. First-run bootstrap: ./scripts/bootstrap-forgejo.sh
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      FORGEJO__security__INSTALL_LOCK: "true"          # config-as-code; no installer
      FORGEJO__database__DB_TYPE: sqlite3              # single-operator scale; lives in the volume
      FORGEJO__server__DOMAIN: git.${NODE_DOMAIN}
      FORGEJO__server__ROOT_URL: https://git.${NODE_DOMAIN}/
      FORGEJO__server__SSH_PORT: "2222"
      FORGEJO__service__DISABLE_REGISTRATION: "true"   # you, then invited users only
      # SSO links to EXISTING accounts by matching email — the Forgejo email
      # must equal the Pocket ID one. Registration stays disabled: an unknown
      # IdP email gets nothing. Invited users reach git only if you create
      # their Forgejo account (matching email) deliberately.
      FORGEJO__oauth2_client__ACCOUNT_LINKING: "auto"
    volumes:
      - forgejo_data:/data
    networks: [edge, agents]   # agents clone/push here, by scoped token
    # SSH for git push. Deliberate second ingress — remove if HTTPS-only suits you.
    ports:
      - "2222:22"

  # --- identity plane -------------------------------------------------------
  # The node IS the identity provider: passkey -> Pocket ID (OIDC) -> everything
  # federates. Passkey-only is enforced by the product: Pocket ID has no
  # password mode to misconfigure. Single container, SQLite. That is the point.

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v1@sha256:f8cde808e8e840acda25683fc2168e0206e3f3fb1a48cca89d211aafd87eaeef
    container_name: pocket-id
    restart: unless-stopped
    environment:
      APP_URL: https://auth.${NODE_DOMAIN}
      TRUST_PROXY: "true"
    volumes:
      - pocketid_data:/app/data     # SQLite + keys live here; in restic include list
    networks: [edge]

  # Forward-auth shim for apps with no native OIDC (radicale's web UI): Caddy
  # asks oauth2-proxy, oauth2-proxy asks Pocket ID, the app trusts the asserted
  # header. sso-setup.sh mints its client + cookie secret and starts it —
  # it is part of the door. Manual enable:
  #   docker compose --profile authshim up -d
  oauth2-proxy:
    profiles: [authshim]
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1@sha256:d62e2d81c6f5048f652f67c302083be1272c181b971fad80e5a30ebe2b8b75d8
    container_name: oauth2-proxy
    restart: unless-stopped
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://auth.${NODE_DOMAIN}
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID:-}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET:-}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:-}   # openssl rand -base64 32 | head -c 32
      OAUTH2_PROXY_COOKIE_DOMAINS: .${NODE_DOMAIN}
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      # One IdP only — skip the interstitial page, go straight to the passkey.
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_CODE_CHALLENGE_METHOD: S256    # PKCE; Pocket ID supports it
    networks: [edge]

  # --- trusted-people dashboard ----------------------------------------------
  # Status/health only for now; configured entirely by YAML in git
  # (config/homepage/). Later: agent-exposed app frontends get their own routes.

  homepage:
    image: ghcr.io/gethomepage/homepage:latest@sha256:a0b71c8e757298d02560186bab9fbe3fc2d375c523a62cc1019177b37e48aa28
    container_name: homepage
    restart: unless-stopped
    environment:
      HOMEPAGE_ALLOWED_HOSTS: home.${NODE_DOMAIN}
      HOMEPAGE_VAR_NODE_DOMAIN: ${NODE_DOMAIN}
      HOMEPAGE_VAR_NODE_CONFIG_REPO: ${NODE_CONFIG_REPO:-operator/node-config}
      HOMEPAGE_VAR_COORDINATION_REPO: ${COORDINATION_REPO:-operator/coordination}
      # Dashboard widget credentials — deliberately the WEAK ones: budgeted
      # tenant keys self-reporting via /key/info, the assistant's read-only
      # git token, the Pocket ID admin API key for auth events. The LiteLLM
      # master key and operator tokens never enter this container.
      HOMEPAGE_VAR_AGENT_LLM_KEY: ${AGENT_LLM_KEY:-}
      HOMEPAGE_VAR_ASSISTANT_LLM_KEY: ${ASSISTANT_LLM_KEY:-}
      HOMEPAGE_VAR_DASH_GIT_TOKEN: ${ASSISTANT_FORGEJO_TOKEN:-}
      HOMEPAGE_VAR_POCKET_ID_API_KEY: ${POCKET_ID_API_KEY:-}
      HOMEPAGE_VAR_MINIFLUX_TOKEN: ${MINIFLUX_TASK_TOKEN:-}
    volumes:
      - ./config/homepage:/app/config
      # Generated scenery backgrounds, served from the node itself at /images/*
      - ./config/homepage/images:/app/public/images:ro
    networks: [edge, dockerwatch, front]   # front: health-pings the egress-less apps

  # Read-only docker status for the dashboard: the proxy exposes ONLY
  # container listing (CONTAINERS=1; everything else stays 0/denied) on an
  # internal network whose sole other member is homepage. The socket mounts
  # here read-only; no routed container ever touches it directly.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    container_name: docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: "1"
      POST: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [dockerwatch]

  # --- the agent runtime slot, first tenant -----------------------------------
  # Claude Code in a jail (docs/AGENT.md). Interactive:
  #   docker compose --profile agent build
  #   docker compose run --rm agent
  # Holds: a LiteLLM virtual key + a scoped Forgejo token. Does not hold:
  # docker socket, secrets, host mounts, database networks, deploy access.
  # Network: the `agents` spur only — it can reach LiteLLM and Forgejo and
  # nothing else; radicale, homepage, pocket-id are not even on its wire.

  agent:
    profiles: [agent]
    build: ./agent
    image: sovereign-node/agent:local
    container_name: agent
    stdin_open: true
    tty: true
    environment:
      # Harness choice (entrypoint): forge (default) or claude. Forge speaks
      # OpenAI-compatible to LiteLLM — model FAMILIES are a `:model <alias>`
      # switch, bounded by the key's allowlist, never a harness change.
      AGENT_HARNESS: ${AGENT_HARNESS:-forge}
      AGENT_MODEL: ${AGENT_MODEL:-}                  # harness-agnostic model knob; entrypoint translates
      OPENAI_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${AGENT_LLM_KEY:-}             # same virtual key, both harnesses
      ANTHROPIC_BASE_URL: http://litellm:4000
      ANTHROPIC_AUTH_TOKEN: ${AGENT_LLM_KEY:-}       # virtual key — never a provider key
      # Unconfigured default = the cheap model (deepseek-flash), never premium.
      ANTHROPIC_MODEL: ${AGENT_MODEL:-deepseek-flash}            # LiteLLM alias
      ANTHROPIC_SMALL_FAST_MODEL: ${AGENT_FAST_MODEL:-deepseek-flash}
      AGENT_FORGEJO_TOKEN: ${AGENT_FORGEJO_TOKEN:-}  # scope: node-config + apps/* + issues
      NODE_CONFIG_REPO: ${NODE_CONFIG_REPO:-}
      COORDINATION_REPO: ${COORDINATION_REPO:-}      # the shared notebook (skills/coordination)
    volumes:
      - agent_workspace:/workspace
    networks: [agents]

  # --- the front-door assistant ------------------------------------------------
  # The conversational tenant: the operator opens a terminal and asks for
  # things — reads, summaries, notes. Distinct identity from agent-dev with
  # a deliberately weaker token: read on node-config, write on ISSUES only.
  # It has no PR path; work needing code changes becomes a `handoff` issue
  # the dev-agent picks up. Same jail, same spur, own budget.
  #   docker compose run --rm assistant
  assistant:
    profiles: [assistant]
    build: ./agent
    image: sovereign-node/agent:local
    container_name: assistant
    stdin_open: true
    tty: true
    environment:
      # Conversational tenant keeps Claude Code as its harness (known-good
      # UX); forge is available here too via AGENT_HARNESS=forge.
      AGENT_HARNESS: ${ASSISTANT_HARNESS:-claude}
      OPENAI_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${ASSISTANT_LLM_KEY:-}
      ANTHROPIC_BASE_URL: http://litellm:4000
      ANTHROPIC_AUTH_TOKEN: ${ASSISTANT_LLM_KEY:-}      # its own virtual key, own budget
      ANTHROPIC_MODEL: ${ASSISTANT_MODEL:-claude-sonnet}
      ANTHROPIC_SMALL_FAST_MODEL: ${AGENT_FAST_MODEL:-claude-haiku}
      AGENT_GIT_USER: assistant
      AGENT_FORGEJO_TOKEN: ${ASSISTANT_FORGEJO_TOKEN:-} # read:repository,write:issue — no code writes
      NODE_CONFIG_REPO: ${NODE_CONFIG_REPO:-}
      COORDINATION_REPO: ${COORDINATION_REPO:-}
      MINIFLUX_TASK_TOKEN: ${MINIFLUX_TASK_TOKEN:-}     # read-only feed surface, same as the digester
    volumes:
      - assistant_workspace:/workspace
      # Its operating contract replaces the dev-agent one baked into the image.
      - ./agent/ASSISTANT.md:/home/agent/.claude/CLAUDE.md:ro
      - ./agent/ASSISTANT.md:/home/agent/AGENTS.md:ro
    networks: [agents]

  # --- service registry (M1) --------------------------------------------------
  # One endpoint answering "what services exist here and what can I call":
  # aggregates manifest/*.toml (+ the node manifest) into JSON. Discovery for
  # humans, the installer, and agents alike — for agents it is effectively MCP
  # discovery; for service-to-service calls it points at OpenAPI contracts.
  # Read-only mounts, stdlib only, no state. Agents reach it on the spur at
  # http://registry:8090; humans via registry.<domain> (ring 0).

  registry:
    image: python:3.12-alpine@sha256:6d43704baacd1bfbe7c295d7f13079d5d8104ed33568873133f8fc69980419df
    container_name: registry
    restart: unless-stopped
    command: ["python", "/srv/registry.py"]
    environment:
      NODE_DOMAIN: ${NODE_DOMAIN}
    volumes:
      - ./registry/registry.py:/srv/registry.py:ro
      - ./manifest:/srv/manifest:ro
    networks: [edge, agents]

  # ---------------------------------------------------------------------------
  # Coming in later milestones (see docs/ROADMAP.md) — intentionally not yet here:
  #
  #   memos        — Google-Keep-style notes; arrives as the agent's first
  #                  worked example (docs/AGENT.md).
  # ---------------------------------------------------------------------------
