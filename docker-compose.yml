name: sovereign-node

# Trust boundaries are enforced by networks, not by good intentions.
#   edge     — only things Caddy is allowed to reach. Caddy is the sole ingress.
#   litellm  — LiteLLM <-> its database. Nothing else can reach Postgres.
# Future agent runtimes join `edge` only, and talk to services through their
# published ports — never to databases, never to the docker socket.

networks:
  edge:
  litellm:

volumes:
  caddy_data:
  caddy_config:
  litellm_db:
  forgejo_data:
  radicale_data:
  pocketid_data:
  agent_workspace:

services:
  caddy:
    image: caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      NODE_DOMAIN: ${NODE_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      # default TEST-NET-1 = matches nothing real; set real CIDRs in .env
      EXTRA_TRUSTED_RANGES: ${EXTRA_TRUSTED_RANGES:-192.0.2.0/32}
    volumes:
      - ./caddy:/etc/caddy:ro     # Caddyfile + untracked local/*.caddy overrides
      - caddy_data:/data
      - caddy_config:/config
    networks: [edge]

  litellm:
    # Digest-pinned (as is every image here). To update: scripts/pin-images.sh,
    # review the diff, commit. Rollback = git revert + docker compose up -d.
    image: ghcr.io/berriai/litellm:main-stable@sha256:9ef6f45bc0104940571765e610c52a1d761b5ec85efcd193795281086ee61277
    container_name: litellm
    restart: unless-stopped
    depends_on:
      - litellm-db
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      DATABASE_URL: postgresql://litellm:${LITELLM_DB_PASSWORD}@litellm-db:5432/litellm
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}   # ring 0 — admin only
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}       # set once, never rotate casually
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      STORE_MODEL_IN_DB: "True"
    volumes:
      - ./config/litellm.yaml:/app/config.yaml:ro
    networks: [edge, litellm]

  litellm-db:
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    container_name: litellm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD}
    volumes:
      - litellm_db:/var/lib/postgresql/data
    networks: [litellm]

  forgejo:
    image: codeberg.org/forgejo/forgejo:11@sha256:946243edbab116d5bb78b73ea68af6f3d69229ba1b1ed958dd82c3481167f3e0
    container_name: forgejo
    restart: unless-stopped
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      FORGEJO__server__DOMAIN: git.${NODE_DOMAIN}
      FORGEJO__server__ROOT_URL: https://git.${NODE_DOMAIN}/
      FORGEJO__server__SSH_PORT: "2222"
      FORGEJO__service__DISABLE_REGISTRATION: "true"   # you, then invited users only
    volumes:
      - forgejo_data:/data
    networks: [edge]
    # SSH for git push. Deliberate second ingress — remove if HTTPS-only suits you.
    ports:
      - "2222:22"

  radicale:
    profiles: [apps]
    image: tomsquest/docker-radicale:latest@sha256:ce7264ac5bd7ee7f5903e2ce1398a5df25ae3dda7e017487f510a761827144a5
    container_name: radicale
    restart: unless-stopped
    volumes:
      - radicale_data:/data
    networks: [edge]

  # --- identity plane -------------------------------------------------------
  # The node IS the identity provider: passkey -> Pocket ID (OIDC) -> everything
  # federates. Passkey-only is enforced by the product: Pocket ID has no
  # password mode to misconfigure. Single container, SQLite. That is the point.

  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v1@sha256:f8cde808e8e840acda25683fc2168e0206e3f3fb1a48cca89d211aafd87eaeef
    container_name: pocket-id
    restart: unless-stopped
    environment:
      APP_URL: https://auth.${NODE_DOMAIN}
      TRUST_PROXY: "true"
    volumes:
      - pocketid_data:/app/data     # SQLite + keys live here; in restic include list
    networks: [edge]

  # Forward-auth shim for apps with no native OIDC (radicale): Caddy asks
  # oauth2-proxy, oauth2-proxy asks Pocket ID, the app trusts the asserted
  # header. Enable AFTER creating its OIDC client in Pocket ID (docs/ONBOARDING.md):
  #   docker compose --profile authshim up -d
  oauth2-proxy:
    profiles: [authshim]
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1@sha256:d62e2d81c6f5048f652f67c302083be1272c181b971fad80e5a30ebe2b8b75d8
    container_name: oauth2-proxy
    restart: unless-stopped
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_OIDC_ISSUER_URL: https://auth.${NODE_DOMAIN}
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID:-}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET:-}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET:-}   # openssl rand -base64 32 | head -c 32
      OAUTH2_PROXY_COOKIE_DOMAINS: .${NODE_DOMAIN}
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
    networks: [edge]

  # --- trusted-people dashboard ----------------------------------------------
  # Status/health only for now; configured entirely by YAML in git
  # (config/homepage/). Later: agent-exposed app frontends get their own routes.

  homepage:
    image: ghcr.io/gethomepage/homepage:latest@sha256:a0b71c8e757298d02560186bab9fbe3fc2d375c523a62cc1019177b37e48aa28
    container_name: homepage
    restart: unless-stopped
    environment:
      HOMEPAGE_ALLOWED_HOSTS: home.${NODE_DOMAIN}
      HOMEPAGE_VAR_NODE_DOMAIN: ${NODE_DOMAIN}
    volumes:
      - ./config/homepage:/app/config
    networks: [edge]

  # --- the agent runtime slot, first tenant -----------------------------------
  # Claude Code in a jail (docs/AGENT.md). Interactive:
  #   docker compose --profile agent build
  #   docker compose run --rm agent
  # Holds: a LiteLLM virtual key + a scoped Forgejo token. Does not hold:
  # docker socket, secrets, host mounts, database networks, deploy access.

  agent:
    profiles: [agent]
    build: ./agent
    image: sovereign-node/agent:local
    container_name: agent
    stdin_open: true
    tty: true
    environment:
      ANTHROPIC_BASE_URL: http://litellm:4000
      ANTHROPIC_AUTH_TOKEN: ${AGENT_LLM_KEY:-}       # virtual key — never a provider key
      ANTHROPIC_MODEL: ${AGENT_MODEL:-claude-sonnet}             # LiteLLM alias
      ANTHROPIC_SMALL_FAST_MODEL: ${AGENT_FAST_MODEL:-claude-haiku}
      AGENT_FORGEJO_TOKEN: ${AGENT_FORGEJO_TOKEN:-}  # scope: node-config + apps/* only
      NODE_CONFIG_REPO: ${NODE_CONFIG_REPO:-}
    volumes:
      - agent_workspace:/workspace
    networks: [edge]

  # ---------------------------------------------------------------------------
  # Coming in later milestones (see docs/ROADMAP.md) — intentionally not yet here:
  #
  #   gog-bridge   — gog/gws MCP container: mail/calendar/drive via your Google
  #                  account, read-only by default, --gmail-no-send at the door.
  #   miniflux     — pull-based feed aggregator (your algorithm-free timeline).
  #   memos        — Google-Keep-style notes; arrives as the agent's first
  #                  worked example (docs/AGENT.md).
  # ---------------------------------------------------------------------------
