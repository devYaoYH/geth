# LiteLLM proxy config — the single gate between this node and model providers.
#
# Principles:
#  - Provider keys enter here (via env) and never leave.
#  - Every consumer — you, scripts, future agents — gets a VIRTUAL key minted in
#    the UI (https://llm.<domain>/ui) with its own budget, rate limit, and model
#    allowlist. Revoking one consumer never rotates a provider key.
#  - Local inference (Tier 4) is added as just another model entry; consumers
#    never know or care where inference physically runs.

model_list:
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: gpt
    litellm_params:
      model: openai/gpt-5
      api_key: os.environ/OPENAI_API_KEY

  # Open-source lane via OpenRouter — lightweight coding-agent tasks.
  # reasoning_effort is pinned here so every consumer of this alias gets the
  # same behavior; a different effort level would be a separate alias.
  - model_name: deepseek-flash
    litellm_params:
      model: openrouter/deepseek/deepseek-v4-flash
      api_key: os.environ/OPENROUTER_API_KEY
      reasoning_effort: xhigh

  # Tier 4 preview — local inference via an OpenAI-compatible server (Ollama,
  # vLLM, MLX, a DGX box). Uncomment and point at your hardware:
  # - model_name: local-small
  #   litellm_params:
  #     model: openai/qwen3
  #     api_base: http://inference-box:11434/v1
  #     api_key: none

litellm_settings:
  drop_params: true
  capture_cost_from_provider: true
  num_retries: 2
  request_timeout: 120
  # GLOBAL spend ceiling across ALL keys, resetting monthly. This is the real
  # spend control for the concurrent-agent swarm: per-run keys cap a single run,
  # but only this bounds the AGGREGATE across many concurrent + successive runs.
  # deepseek-flash (the agent default) is cheap — this is a runaway backstop,
  # not a target. Raise/lower to taste; when hit, all inference 402s until reset.
  max_budget: 50            # USD per budget_duration
  budget_duration: 30d
  # Pairs with store_prompts_in_spend_logs below: captures the raw request
  # (the messages) alongside the response in each spend-log row.
  log_raw_request_response: true
  # Group a caller's turns into one session. Forge sends no session id, so
  # without this every agent turn is a separate "session" in the Logs UI.
  # The hook derives session_id from the virtual key (run-task.sh mints one
  # per run → one session per run). See config/litellm_hooks.py.
  callbacks: litellm_hooks.session_by_key

general_settings:
  # Virtual keys, spend tracking and budgets are stored in Postgres.
  # Mint per-consumer keys via the UI or:
  #   curl -s https://llm.<domain>/key/generate \
  #     -H "Authorization: Bearer $LITELLM_MASTER_KEY" \
  #     -d '{"key_alias":"agent-feeds","models":["claude-haiku"],"max_budget":5}'
  # Full request/response traces in the Logs UI (llm.<domain>/ui -> Logs).
  # Deliberate tradeoff: every conversation — yours and the agents' — lands
  # in litellm-db in cleartext. Acceptable here because that DB is ring 0,
  # on-node, and reviewing what an agent was actually told / actually said
  # IS the operator's audit surface for jail runs.
  store_prompts_in_spend_logs: true
