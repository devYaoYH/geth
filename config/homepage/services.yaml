# Services shown on the dashboard, with live health checks.
# siteMonitor hits the container directly over the edge/front network; server/
# container entries pull live docker status via docker-proxy (read-only).
# Widget credentials are HOMEPAGE_VAR_* env — always the weak ones: budgeted
# tenant keys, read-only tokens, never master/operator credentials.

# --- Home: your day at a glance, then the apps you live in -------------------

- Today:
    - Your day:
        id: today-calendar
        icon: mdi-calendar-heart
        href: https://cal.{{HOMEPAGE_VAR_NODE_DOMAIN}}
        description: what's on your calendar today
        widget:
          type: customapi
          url: http://radicale-toolshim:8100/events/today?limit=3
          display: list
          mappings:
            - field: events.0.summary
              label: next up
            - field: events.1.summary
              label: then
    - Something to read:
        id: today-reading
        icon: mdi-lightbulb-on-outline
        href: https://feeds.{{HOMEPAGE_VAR_NODE_DOMAIN}}/unread
        description: freshest unread pick from your feeds
        widget:
          type: customapi
          url: http://miniflux:8080/v1/entries?status=unread&limit=1&order=published_at&direction=desc
          headers:
            X-Auth-Token: {{HOMEPAGE_VAR_MINIFLUX_TOKEN}}
          mappings:
            - field: entries.0.title
              label: worth a look
            - field: total
              label: unread
              format: number
    - Waiting on you:
        id: today-attention
        icon: mdi-bell-badge-outline
        href: /#workshop
        description: proposals and handoffs — head to the Workshop
        widget:
          type: customapi
          url: http://forgejo:3000/api/v1/repos/{{HOMEPAGE_VAR_COORDINATION_REPO}}/issues?state=open&labels=handoff&limit=1
          headers:
            Authorization: token {{HOMEPAGE_VAR_DASH_GIT_TOKEN}}
          display: list
          mappings:
            - field: 0.title
              label: latest handoff

- Apps:
    - Calendar:
        icon: radicale.png
        href: https://cal.{{HOMEPAGE_VAR_NODE_DOMAIN}}
        description: calendar & contacts
        server: sovereign-node
        container: radicale
        siteMonitor: http://radicale:5232
    - Calino:
        icon: mdi-calendar-text
        href: https://calino.{{HOMEPAGE_VAR_NODE_DOMAIN}}
        description: calendar web UI
        server: sovereign-node
        container: calino
        siteMonitor: http://calino:8080/
    - Notes:
        icon: memos.png
        href: https://notes.{{HOMEPAGE_VAR_NODE_DOMAIN}}
        description: capture ideas
        server: sovereign-node
        container: memos
        siteMonitor: http://memos:5230/healthz
    - Feeds:
        icon: miniflux.png
        href: https://feeds.{{HOMEPAGE_VAR_NODE_DOMAIN}}
        description: calm reading
        server: sovereign-node
        container: miniflux
        siteMonitor: http://miniflux:8080/healthcheck
    - The Floor:
        icon: mdi-factory
        href: https://floor.{{HOMEPAGE_VAR_NODE_DOMAIN}}
        description: watch your node at work — every service a room, every data flow a worker
        server: sovereign-node
        container: floor
        siteMonitor: http://floor:8080/healthz
    - Snake:
        icon: mdi-gamepad-variant-outline
        id: snake-tile
        href: https://game.{{HOMEPAGE_VAR_NODE_DOMAIN}}
        description: take a playful five-minute break
        server: sovereign-node
        container: snake
        siteMonitor: http://snake:8080/
    - Assistant:
        icon: open-webui.png
        href: https://chat.{{HOMEPAGE_VAR_NODE_DOMAIN}}
        description: full chat
        server: sovereign-node
        container: open-webui
        siteMonitor: http://open-webui:8080/health

# --- Workshop: review, assign, unblock — where the house gets built ----------

- Waiting on you:
    - Proposals to approve:
        id: proposals
        icon: mdi-source-pull
        href: https://git.{{HOMEPAGE_VAR_NODE_DOMAIN}}/{{HOMEPAGE_VAR_NODE_CONFIG_REPO}}/pulls
        description: your explicit approval is the release gate
        widget:
          type: customapi
          url: http://forgejo:3000/api/v1/repos/{{HOMEPAGE_VAR_NODE_CONFIG_REPO}}/pulls?state=open
          headers:
            Authorization: token {{HOMEPAGE_VAR_DASH_GIT_TOKEN}}
          display: list
          mappings:
            - field: 0.title
              label: newest proposal
    - Agent handoffs:
        id: handoffs
        icon: mdi-inbox-arrow-down-outline
        href: https://git.{{HOMEPAGE_VAR_NODE_DOMAIN}}/{{HOMEPAGE_VAR_COORDINATION_REPO}}/issues
        description: blocks, decisions, and finished work waiting for you
        widget:
          type: customapi
          url: http://forgejo:3000/api/v1/repos/{{HOMEPAGE_VAR_COORDINATION_REPO}}/issues?state=open&labels=handoff
          headers:
            Authorization: token {{HOMEPAGE_VAR_DASH_GIT_TOKEN}}
          display: list
          mappings:
            - field: 0.title
              label: latest handoff
    - Ask your engineering org:
        icon: mdi-message-processing-outline
        href: https://chat.{{HOMEPAGE_VAR_NODE_DOMAIN}}
        description: describe what you want built, changed, or investigated
        server: sovereign-node
        container: open-webui
        siteMonitor: http://open-webui:8080/health

- Engineering org:
    - Agent notebook:
        icon: mdi-notebook-outline
        href: https://git.{{HOMEPAGE_VAR_NODE_DOMAIN}}/{{HOMEPAGE_VAR_COORDINATION_REPO}}/issues
        description: handoffs, blocks, observations, task digests
    - Engineering spend:
        icon: mdi-brain
        href: https://llm.{{HOMEPAGE_VAR_NODE_DOMAIN}}/ui
        description: resident engineering agent's monthly allowance
        widget:
          type: customapi
          url: http://litellm:4000/key/info
          refreshInterval: 30000
          headers:
            Authorization: Bearer {{HOMEPAGE_VAR_AGENT_LLM_KEY}}
          mappings:
            - field: info.spend
              label: spent $
              format: float
            - field: info.max_budget
              label: budget $
              format: float
    - Assistant spend:
        icon: mdi-brain
        href: https://llm.{{HOMEPAGE_VAR_NODE_DOMAIN}}/ui
        description: your front-door assistant's monthly allowance
        widget:
          type: customapi
          url: http://litellm:4000/key/info
          refreshInterval: 30000
          headers:
            Authorization: Bearer {{HOMEPAGE_VAR_ASSISTANT_LLM_KEY}}
          mappings:
            - field: info.spend
              label: spent $
              format: float
            - field: info.max_budget
              label: budget $
              format: float
    - Mirrors:
        icon: mdi-source-repository-multiple
        href: https://git.{{HOMEPAGE_VAR_NODE_DOMAIN}}/mirrors
        description: upstream software held in your own forge

# --- Operations & Security: unchanged planes ---------------------------------

- Node & access:
    - Forgejo:
        icon: forgejo.png
        href: https://git.{{HOMEPAGE_VAR_NODE_DOMAIN}}
        description: your source of truth and change ledger
        server: sovereign-node
        container: forgejo
        siteMonitor: http://forgejo:3000
    - LiteLLM gateway:
        icon: mdi-brain
        href: https://llm.{{HOMEPAGE_VAR_NODE_DOMAIN}}
        description: model access, budgets, and request audit
        server: sovereign-node
        container: litellm
        siteMonitor: http://litellm:4000/health/liveliness
    - Pocket ID:
        icon: pocket-id.png
        href: https://auth.{{HOMEPAGE_VAR_NODE_DOMAIN}}/settings/admin
        description: passkeys, people, and OIDC clients
        server: sovereign-node
        container: pocket-id
        siteMonitor: http://pocket-id:1411/healthz
    - Agent web search audit:
        icon: mdi-magnify-scan
        href: https://search.{{HOMEPAGE_VAR_NODE_DOMAIN}}
        description: operator dashboard for logged Exa searches
        server: sovereign-node
        container: search-broker

- Services (Docker):
    - registry:
        icon: mdi-format-list-bulleted-square
        description: service discovery · ring 0
        server: sovereign-node
        container: registry
    - homepage:
        icon: mdi-home-heart
        description: this dashboard
        server: sovereign-node
        container: homepage
    - caddy:
        icon: caddy.png
        description: the only exposed thing
        server: sovereign-node
        container: caddy
    - litellm-db:
        icon: postgresql.png
        description: LiteLLM's postgres · private network
        server: sovereign-node
        container: litellm-db
    - miniflux-db:
        icon: postgresql.png
        description: Miniflux's postgres · private network
        server: sovereign-node
        container: miniflux-db
    - docker-proxy:
        icon: docker.png
        description: read-only container status for this page
        server: sovereign-node
        container: docker-proxy

- Tenant boundaries:
    - agent-dev (resident):
        icon: mdi-robot-outline
        description: engineering tenant · $25/mo · proposes through PRs only
    - assistant (front door):
        icon: mdi-message-processing-outline
        description: conversational tenant · reads and files issues; no deploy path
    - ephemeral tasks:
        icon: mdi-timer-sand
        description: short-lived runs · per-task key, budget, expiry, and artifact
    - operator (you):
        icon: mdi-crown-outline
        description: ring 0 · only you merge, deploy, mint, and change policy

- Identity & audit:
    - Identity admin:
        icon: pocket-id.png
        href: https://auth.{{HOMEPAGE_VAR_NODE_DOMAIN}}/settings/admin
        description: manage passkeys, people, and OIDC clients
    - Security events:
        icon: mdi-shield-alert-outline
        href: https://auth.{{HOMEPAGE_VAR_NODE_DOMAIN}}/settings/admin
        description: latest event at the identity door
        widget:
          type: customapi
          url: http://pocket-id:1411/api/audit-logs?pagination%5Blimit%5D=1&sort%5Bcolumn%5D=createdAt&sort%5Bdirection%5D=desc
          headers:
            X-API-KEY: {{HOMEPAGE_VAR_POCKET_ID_API_KEY}}
          mappings:
            - field: data.0.event
              label: latest
            - field: data.0.createdAt
              label: when
              format: relativeDate
    - Access policy:
        icon: mdi-shield-lock-outline
        href: https://git.{{HOMEPAGE_VAR_NODE_DOMAIN}}/{{HOMEPAGE_VAR_NODE_CONFIG_REPO}}
        description: inspect the versioned rules that define every boundary
